<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ResumeIQ</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#f3f6fb;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;

        }

        .container{

            width:800px;
            background:white;
            padding:50px;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
            text-align:center;

        }

        h1{

            color:#2d62ea;
            font-size:55px;
            margin-bottom:20px;

        }

        h2{

            color:#333;
            margin-bottom:20px;

        }

        p{

            font-size:22px;
            color:#666;
            margin-bottom:40px;

        }

        .section-title{

            text-align:left;
            font-size:22px;
            margin-bottom:12px;
            color:#222;

        }

        input[type=file]{

            width:100%;
            padding:12px;
            margin-bottom:35px;

        }

        textarea{

            width:100%;
            height:220px;
            padding:15px;
            border-radius:10px;
            border:1px solid #ccc;
            resize:none;
            font-size:16px;
            margin-bottom:30px;

        }

        button{

            background:#2d62ea;
            color:white;
            border:none;
            padding:16px 45px;
            font-size:22px;
            border-radius:10px;
            cursor:pointer;
            transition:.3s;

        }

        button:hover{

            background:#1848c9;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>ResumeIQ</h1>

    <h2>AI-Powered Resume & Job Match Analyzer</h2>

    <p>
        Upload your resume and paste the job description to calculate
        your resume score, job match percentage, and missing skills.
    </p>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <div class="section-title">
            Upload Resume (PDF)
        </div>

        <input
            type="file"
            name="resume"
            accept=".pdf"
            required>

        <div class="section-title">
            Paste Job Description
        </div>

        <textarea
            name="job_description"
            placeholder="Example:

Python Developer

Required Skills:
Python
SQL
Flask
Git
AWS

Responsibilities:
Develop web applications using Python and Flask.
Work with SQL databases.
Collaborate with development teams."
            required></textarea>

        <button type="submit">
            Analyze Resume
        </button>

    </form>

</div>

</body>

</html>
